# Server block du front Orion (inclus par le nginx.conf de l'image unprivileged)
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des livrables texte
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Reverse proxy vers l'API : le front appelle des URL relatives /api,
    # miroir exact du proxy Vite utilisé en dev (cf. doc §3.1)
    location /api {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets fingerprintés par Vite : cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : toute route inconnue est rendue par index.html (routing côté client)
    location / {
        try_files $uri /index.html;
    }
}
