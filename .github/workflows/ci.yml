name: CI

# Matrice des déclencheurs : cf. DOCUMENTATION.md §4.2
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  schedule:
    # Nightly : détecte les régressions sans commit (nouvelle CVE, dérive de dépendance)
    - cron: '30 3 * * *'
  workflow_dispatch:

# Le GITHUB_TOKEN n'a que le droit de lire le dépôt (moindre privilège)
permissions:
  contents: read

# Un nouveau push annule les runs devenus obsolètes sur la même branche
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  NODE_VERSION: '22'

jobs:
  server:
    name: Back — lint, typecheck, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Générer le client Prisma
        run: npm run prisma:generate
      - name: Lint
        run: npm run lint
      - name: Vérification des types
        run: npm run typecheck
      - name: Tests unitaires et d'intégration (couverture)
        run: npm run test:coverage
      - name: Build (TypeScript > dist/)
        run: npm run build
      - name: Publier le rapport de couverture
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-coverage
          path: server/coverage/lcov.info

  client:
    name: Front — lint, typecheck, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Vérification des types
        run: npm run typecheck
      - name: Tests de composants (couverture)
        run: npm run test:coverage
      - name: Build (Vite > dist/)
        run: npm run build
      - name: Publier le rapport de couverture
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-coverage
          path: client/coverage/lcov.info

  sonar:
    name: Analyse SonarQube Cloud
    # Quality gate exigée sur les PR et sur main ; inutile sur les branches sans PR
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [server, client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Historique complet requis par Sonar (attribution du new code)
          fetch-depth: 0
      - name: Récupérer la couverture back
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-coverage
          path: server/coverage
      - name: Récupérer la couverture front
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-coverage
          path: client/coverage
      - name: Analyse et quality gate
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Le job échoue si la quality gate est rouge : check bloquant côté PR
          args: -Dsonar.qualitygate.wait=true

  docker:
    name: Images Docker — build, smoke test, scan Trivy
    # PR, main, nightly et déclenchement manuel ; inutile sur un simple push de branche
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build des images
        run: docker compose build
      - name: Smoke test — démarrage de la stack complète
        # --wait échoue si un healthcheck ne passe pas au vert
        run: docker compose up -d --wait --wait-timeout 120
      - name: Smoke test — endpoints
        run: |
          curl -fsS http://localhost:8080/api/health
          # À travers le reverse proxy nginx du front
          curl -fsS http://localhost:4200/api/health
          # Le front sert bien sa page
          curl -fsS http://localhost:4200/ | grep -q '<div id="root">'
      - name: Logs de la stack (diagnostic)
        if: failure()
        run: docker compose logs
      - name: Arrêt de la stack
        if: always()
        run: docker compose down -v
      - name: Scan Trivy — image server
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ghcr.io/enhydrav/ocr-jsld-p7-server:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
          # Ne bloque que sur les CVE corrigeables (les CVE sans correctif éditeur
          # rendraient le job rouge en permanence sans action possible)
          ignore-unfixed: true
      - name: Scan Trivy — image client
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ghcr.io/enhydrav/ocr-jsld-p7-client:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  release:
    name: Release SemVer (semantic-release)
    # Uniquement depuis un push sur main intégralement validé par le reste de la CI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [server, client, sonar, docker]
    runs-on: ubuntu-latest
    permissions:
      # Nécessaire pour pousser le tag et créer la release GitHub
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Historique complet requis : semantic-release analyse les commits
          # depuis la dernière release pour déduire le niveau de version
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Build back (artefact de release)
        working-directory: server
        run: |
          npm ci
          npm run prisma:generate
          npm run build
      - name: Build front (artefact de release)
        working-directory: client
        run: |
          npm ci
          npm run build
      - name: Empaqueter les artefacts
        run: |
          tar -czf orion-server-dist.tar.gz -C server dist prisma package.json package-lock.json
          tar -czf orion-client-dist.tar.gz -C client dist
      - name: semantic-release (tag + release GitHub si commits éligibles)
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publication GHCR
    # Stratégie de déploiement §3.3 : chaque push sur main validé publie les images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # release dépend déjà de tous les autres jobs (tests, sonar, docker)
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Connexion à GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Métadonnées image server (tags latest + SHA + version éventuelle)
        id: meta-server
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=raw,value=v${{ needs.release.outputs.new_release_version }},enable=${{ needs.release.outputs.new_release_published == 'true' }}
      - name: Build et push image server
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
      - name: Métadonnées image client (tags latest + SHA + version éventuelle)
        id: meta-client
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}-client
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=raw,value=v${{ needs.release.outputs.new_release_version }},enable=${{ needs.release.outputs.new_release_published == 'true' }}
      - name: Build et push image client
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: client
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}

  audit:
    name: Audit des dépendances (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit back
        working-directory: server
        run: npm audit --audit-level=high
      - name: Audit front
        working-directory: client
        run: npm audit --audit-level=high
