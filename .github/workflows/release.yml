name: Release

# Release SemVer : un tag vX.Y.Z est posé manuellement sur un commit de main
# déjà validé par la CI (cf. DOCUMENTATION.md §3.3, politique de versioning)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  release:
    name: Release GitHub + artefacts
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier le format SemVer strict du tag
        run: |
          echo "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "Tag $GITHUB_REF_NAME non conforme au format vX.Y.Z"; exit 1; }
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Build back (TypeScript > dist/)
        working-directory: server
        run: |
          npm ci
          npm run prisma:generate
          npm run build
      - name: Build front (Vite > dist/)
        working-directory: client
        run: |
          npm ci
          npm run build
      - name: Empaqueter les artefacts
        run: |
          tar -czf "orion-server-$GITHUB_REF_NAME.tar.gz" -C server dist prisma package.json package-lock.json
          tar -czf "orion-client-$GITHUB_REF_NAME.tar.gz" -C client dist
      - name: Créer la release GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "orion-server-$GITHUB_REF_NAME.tar.gz" \
            "orion-client-$GITHUB_REF_NAME.tar.gz" \
            --title "Orion CRM $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
