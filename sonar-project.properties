# Projet SonarQube Cloud — analyse déclenchée par la CI (pas d'Automatic Analysis)
sonar.projectKey=EnhydraV_ocr-jsld-p7
sonar.organization=enhydrav
sonar.projectName=ocr-jsld-p7

# Monorepo : sources applicatives des deux modules
sonar.sources=client/src,server/src
sonar.exclusions=**/tests/**

# Tests déclarés séparément pour ne pas polluer les métriques de code
sonar.tests=client/src/tests,server/src/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Couverture lcov produite par Vitest (jobs back et front de la CI)
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info
# Points d'entrée exclus de l'exigence de couverture (bootstrap sans logique)
sonar.coverage.exclusions=client/src/main.tsx,server/src/index.ts

sonar.sourceEncoding=UTF-8
