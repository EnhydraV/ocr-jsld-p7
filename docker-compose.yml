# Stack Orion CRM — cf. DOCUMENTATION.md §3.2
# Lancement : docker compose up --build  |  front sur :4200, API sur :8080
name: orion

services:
  server:
    container_name: orion-server
    # image + build : `up --build` reconstruit localement (lancement autonome),
    # `pull` récupère la dernière image publiée par la CI (déploiement, §3.3)
    image: ghcr.io/enhydrav/ocr-jsld-p7-server:latest
    build: ./server
    ports:
      - "8080:8080"
    volumes:
      # Persistance de la base SQLite (survit aux recréations ; détruit par down -v)
      - orion-db:/app/data
    networks:
      - orion

  client:
    container_name: orion-client
    image: ghcr.io/enhydrav/ocr-jsld-p7-client:latest
    build: ./client
    ports:
      # nginx-unprivileged écoute sur 8080 (port non privilégié), exposé en 4200
      - "4200:8080"
    depends_on:
      # Le front n'est démarré que lorsque le healthcheck du back est vert
      server:
        condition: service_healthy
    networks:
      - orion

volumes:
  orion-db:

networks:
  # Nom stable
  orion:
    name: orion
